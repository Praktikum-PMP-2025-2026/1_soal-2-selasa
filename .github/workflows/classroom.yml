name: Autograding Tests

on:
  - push
  - repository_dispatch

permissions:
  checks: write
  actions: read
  contents: read

jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Case 01 - contoh resmi
        id: case-01
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 01 - contoh resmi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "20 0 100 4 1 15 3 2 2 10 1 1"
          expected-output: "AMAN 61"
          comparison-method: exact
          timeout: 2
          max-score: 8

      - name: Case 02 - gagal batas atas
        id: case-02
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 02 - gagal batas atas
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "90 0 100 1 1 20"
          expected-output: "GAGAL 1 110"
          comparison-method: exact
          timeout: 2
          max-score: 7

      - name: Case 03 - gagal batas bawah
        id: case-03
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 03 - gagal batas bawah
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "5 0 100 1 2 10"
          expected-output: "GAGAL 1 -5"
          comparison-method: exact
          timeout: 2
          max-score: 7

      - name: Case 04 - cap menurunkan energi
        id: case-04
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 04 - cap menurunkan energi
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "50 0 100 1 4 20"
          expected-output: "AMAN 20"
          comparison-method: exact
          timeout: 2
          max-score: 7

      - name: Case 05 - cap tidak mengubah
        id: case-05
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 05 - cap tidak mengubah
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "15 0 100 1 4 20"
          expected-output: "AMAN 15"
          comparison-method: exact
          timeout: 2
          max-score: 7

      - name: Case 06 - gagal di langkah kedua
        id: case-06
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 06 - gagal di langkah kedua
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "10 0 30 3 1 5 3 3 2 1"
          expected-output: "GAGAL 2 45"
          comparison-method: exact
          timeout: 2
          max-score: 7

      - name: Case 07 - tepat di batas tetap aman
        id: case-07
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 07 - tepat di batas tetap aman
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "20 0 100 2 2 20 1 100"
          expected-output: "AMAN 100"
          comparison-method: exact
          timeout: 2
          max-score: 7

      - name: Case 08 - gagal setelah cap lalu mul
        id: case-08
        uses: classroom-resources/autograding-io-grader@v1
        with:
          test-name: Case 08 - gagal setelah cap lalu mul
          setup-command: gcc -std=c11 -O2 -Wall -Wextra -o soal2 soal2.c
          command: ./soal2
          input: "40 0 80 3 4 30 1 20 3 2"
          expected-output: "GAGAL 3 100"
          comparison-method: exact
          timeout: 2
          max-score: 7

      - name: Autograding Reporter
        uses: classroom-resources/autograding-grading-reporter@v1
        env:
          CASE-01_RESULTS: "${{steps.case-01.outputs.result}}"
          CASE-02_RESULTS: "${{steps.case-02.outputs.result}}"
          CASE-03_RESULTS: "${{steps.case-03.outputs.result}}"
          CASE-04_RESULTS: "${{steps.case-04.outputs.result}}"
          CASE-05_RESULTS: "${{steps.case-05.outputs.result}}"
          CASE-06_RESULTS: "${{steps.case-06.outputs.result}}"
          CASE-07_RESULTS: "${{steps.case-07.outputs.result}}"
          CASE-08_RESULTS: "${{steps.case-08.outputs.result}}"
        with:
          runners: case-01,case-02,case-03,case-04,case-05,case-06,case-07,case-08
